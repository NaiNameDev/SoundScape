<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат</title>
</head>
<body>
    <h1>Общий чат</h1>
    
    <div>
        <strong>Пользователь: <span id="currentUser">-</span></strong>
    </div>
    
    <hr>
    
    <div>
        <strong>Пользователи онлайн:</strong>
        <div id="usersList">Загрузка...</div>
    </div>
    
    <hr>
    
    <div>
        <strong>Статус:</strong> <span id="status">⚫ Отключено</span>
    </div>
    
    <hr>
    
    <div id="messages" style="height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;">
        <div>Подключение к чату...</div>
    </div>
    
    <hr>
    
    <div>
        <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)" style="width: 300px;">
        <button onclick="sendMessage()">Отправить</button>
    </div>
    
    <hr>
    
    <div>
        <a href="/">На главную</a> | 
        <a href="/login">Выйти</a>
    </div>

    <script src="/static/chat.js"></script>
</body>
</html>
