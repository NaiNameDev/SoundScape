<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Трек — SoundCloud Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #2a2a2a;
      --bg-player: #111;
      --surface: #333;
      --surface-hover: #3d3d3d;
      --accent: #3dc8a0;
      --accent-btn: #2fb890;
      --text-primary: #fff;
      --text-secondary: #aaa;
      --text-muted: #666;
      --border: #3a3a3a;
      --radius-pill: 999px;
      --radius-card: 10px;
      --error: #ff6b6b;
    }
    body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; gap: 12px; padding: 14px 20px; background: var(--bg); position: sticky; top: 0; z-index: 50; }
    .icon-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; text-decoration: none; }
    .icon-btn:hover { opacity: 0.85; }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .btn-home { background: var(--accent); color: #000; }
    .btn-back { background: #555; color: var(--text-secondary); }
    .btn-profile { background: var(--accent); color: #000; }
    .nav-title { flex: 1; font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    main { flex: 1; overflow-y: auto; padding: 24px 20px 120px; }
    .track-header { display: flex; gap: 24px; margin-bottom: 32px; }
    .track-cover { width: 200px; height: 200px; border-radius: var(--radius-card); background: var(--surface); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 72px; overflow: hidden; }
    .track-cover img { width: 100%; height: 100%; object-fit: cover; }
    .track-info { flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
    .track-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .track-artist { font-size: 16px; color: var(--text-secondary); }
    .track-artist a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .track-artist a:hover { text-decoration: underline; }
    .track-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; color: var(--text-muted); }
    .track-description { font-size: 14px; color: var(--text-secondary); line-height: 1.5; margin-top: 4px; }
    .track-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-like { background: transparent; border: 1px solid var(--text-secondary); border-radius: var(--radius-pill); color: var(--text-primary); padding: 10px 24px; font-size: 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-like:hover { border-color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .btn-like.liked { background: #ff444433; border-color: #ff4444; color: #ff6b6b; }
    .player-section { background: var(--surface); border-radius: var(--radius-card); padding: 20px; margin-bottom: 32px; }
    .player-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }
    .custom-player { display: flex; align-items: center; gap: 16px; }
    .btn-play { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
    .btn-play:hover { background: var(--accent-btn); }
    .btn-play svg { width: 22px; height: 22px; fill: #000; }
    .player-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .progress-bar-big { width: 100%; height: 4px; background: #444; border-radius: 2px; cursor: pointer; overflow: hidden; }
    .progress-fill-big { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.1s linear; }
    .time-display { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
    .comments-section { margin-top: 32px; }
    .comments-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .comments-title { font-size: 20px; font-weight: 600; }
    .comments-count { font-size: 14px; color: var(--text-muted); }
    .comment-form { background: var(--surface); border-radius: var(--radius-card); padding: 16px; margin-bottom: 20px; }
    .comment-form textarea { width: 100%; background: #444; border: none; border-radius: 8px; color: var(--text-primary); font-size: 14px; padding: 12px 16px; outline: none; font-family: inherit; resize: vertical; min-height: 60px; margin-bottom: 10px; }
    .comment-form textarea::placeholder { color: var(--text-secondary); }
    .comment-form textarea:focus { outline: 1px solid var(--accent); }
    .comment-form-actions { display: flex; justify-content: space-between; align-items: center; }
    .comment-hint { font-size: 11px; color: var(--text-muted); }
    .btn-send-comment { background: var(--accent); border: none; border-radius: var(--radius-pill); color: #000; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-send-comment:hover { background: var(--accent-btn); }
    .btn-send-comment:disabled { opacity: 0.5; cursor: not-allowed; }
    .comment-status { font-size: 12px; min-height: 18px; margin-top: 8px; }
    .comment-item { display: flex; gap: 12px; padding: 12px; border-radius: var(--radius-card); margin-bottom: 8px; transition: background 0.15s; }
    .comment-item:hover { background: var(--surface-hover); }
    .comment-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 600; flex-shrink: 0; color: var(--text-secondary); }
    .comment-content { flex: 1; min-width: 0; }
    .comment-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .comment-username { font-size: 13px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
    .comment-username:hover { color: var(--accent); text-decoration: underline; }
    .comment-time { font-size: 11px; color: var(--text-muted); }
    .comment-text { font-size: 14px; color: var(--text-primary); line-height: 1.4; word-wrap: break-word; }
    .login-prompt { background: var(--surface); border-radius: var(--radius-card); padding: 16px; text-align: center; color: var(--text-muted); margin-bottom: 20px; }
    .login-prompt a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-prompt a:hover { text-decoration: underline; }
    .empty-state { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px 20px; }
    .loading-state { color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px; }
    .error-state { color: var(--error); font-size: 14px; text-align: center; padding: 20px; }
    .player { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: var(--bg-player); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; gap: 16px; z-index: 100; }
    .player-info { display: flex; align-items: center; gap: 12px; min-width: 200px; max-width: 300px; }
    .player-info .track-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-info .track-artist-small { font-size: 11px; color: var(--text-secondary); }
    .player-controls { display: flex; align-items: center; gap: 20px; }
    .player-controls button { background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; transition: color 0.15s; }
    .player-controls button:hover { color: var(--text-primary); }
    .player-controls .play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; }
    .player-controls .play-btn:hover { background: var(--accent-btn); }
    .player-controls svg { width: 18px; height: 18px; fill: currentColor; }
    .player-controls .play-btn svg { width: 16px; height: 16px; }
    .player-progress-bar-wrap { flex: 1; max-width: 480px; }
    .progress-bar { width: 100%; height: 3px; background: #333; border-radius: 3px; cursor: pointer; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 3px; transition: width 0.1s linear; }
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .player-volume svg { width: 18px; height: 18px; fill: currentColor; }
    .volume-bar { width: 80px; height: 3px; background: #333; border-radius: 3px; cursor: pointer; }
    .volume-fill { height: 100%; width: 65%; background: var(--text-secondary); border-radius: 3px; }
    @media (max-width: 600px) { .track-header { flex-direction: column; align-items: center; text-align: center; } .track-cover { width: 150px; height: 150px; } .track-title { font-size: 24px; } .track-actions { justify-content: center; } .track-meta { justify-content: center; } }
  </style>
</head>
<body>

  <nav>
    <a href="/pages/index.html" class="icon-btn btn-home" title="Главная">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="javascript:history.back()" class="icon-btn btn-back" title="Назад">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <span class="nav-title" id="navTrackTitle">Загрузка...</span>
    <a href="/pages/profile.html" class="icon-btn btn-profile" title="Профиль">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </a>
  </nav>

  <main>
    <div class="track-header" id="trackHeader"><div class="loading-state">Загрузка трека...</div></div>
    <div class="player-section" id="playerSection" style="display: none;">
      <h3>🎧 Плеер</h3>
      <div class="custom-player">
        <button class="btn-play" id="bigPlayBtn" onclick="toggleBigPlayer()">
          <svg viewBox="0 0 24 24" id="bigPlayIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="player-progress-wrap">
          <div class="progress-bar-big" onclick="seekBigPlayer(event)"><div class="progress-fill-big" id="bigProgressFill"></div></div>
          <div class="time-display"><span id="currentTime">0:00</span><span id="totalTime">0:00</span></div>
        </div>
      </div>
      <audio id="bigAudioPlayer" style="display: none;"></audio>
    </div>
    <div class="comments-section">
      <div class="comments-header"><h2 class="comments-title">💬 Комментарии</h2><span class="comments-count" id="commentsCount">0</span></div>
      <div id="commentFormWrapper"></div>
      <div id="commentsList"><div class="loading-state">Загрузка комментариев...</div></div>
    </div>
  </main>

  <div class="player">
    <div class="player-info"><div><div class="track-name" id="playerTrackName">Нет трека</div><div class="track-artist-small" id="playerArtistName">Выберите трек</div></div></div>
    <div class="player-controls">
      <button onclick="bottomPlayer.previous()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="play-btn" onclick="bottomPlayer.togglePlay()"><svg viewBox="0 0 24 24" id="bottomPlayIcon"><path d="M8 5v14l11-7z"/></svg></button>
      <button onclick="bottomPlayer.next()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
    </div>
    <div class="player-progress-bar-wrap"><div class="progress-bar" onclick="bottomPlayer.seek(event)"><div class="progress-fill" id="bottomProgressFill"></div></div></div>
    <div class="player-volume"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg><div class="volume-bar" onclick="bottomPlayer.setVolume(event)"><div class="volume-fill" id="bottomVolumeFill"></div></div></div>
  </div>
  <audio id="bottomAudioPlayer" style="display: none;"></audio>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let trackId = null, trackData = null, isLiked = false, likesCount = 0;
    let playlist = [], currentTrackIndex = -1;

    window.addEventListener('DOMContentLoaded', () => {
      trackId = new URLSearchParams(window.location.search).get('id');
      if (!trackId) { document.getElementById('trackHeader').innerHTML = '<div class="error-state">Трек не найден</div>'; return; }
      loadTrackInfo(); loadComments(); setupPlayers();
      if (currentUser) { setupCommentForm(); checkUserLike(); }
      else document.getElementById('commentFormWrapper').innerHTML = '<div class="login-prompt"><a href="/pages/login.html">Войдите</a>, чтобы оставить комментарий</div>';
      setInterval(loadCommentsSilently, 5000);
    });

    function loadTrackInfo() {
      fetch(`/api/track/info/${trackId}`).then(r => r.json()).then(track => {
        trackData = track;
        document.getElementById('navTrackTitle').textContent = track.title;
        document.getElementById('trackHeader').innerHTML = `
          <div class="track-cover">${track.cover_path ? `<img src="${track.cover_path}" alt="${escapeHtml(track.title)}" />` : '🎵'}</div>
          <div class="track-info">
            <h1 class="track-title">${escapeHtml(track.title)}</h1>
            <div class="track-artist">Исполнитель: <a href="/pages/profile.html?user_id=${track.artist_id}">${escapeHtml(track.artist)}</a></div>
            <div class="track-meta"><span>🎸 ${track.genre || 'Без жанра'}</span><span>▶ ${track.plays_count} прослушиваний</span><span>📅 ${formatDate(track.upload_date)}</span></div>
            ${track.description ? `<div class="track-description">${escapeHtml(track.description)}</div>` : ''}
            <div class="track-actions"><button class="btn-like" id="likeBtn" onclick="toggleLike()"><span id="likeIcon">❤️</span><span id="likeText">Нравится</span><span class="btn-like-count" id="likeCount">0</span></button></div>
          </div>`;
        document.getElementById('bigAudioPlayer').src = track.file_path;
        document.getElementById('playerSection').style.display = 'block';
        document.getElementById('playerTrackName').textContent = track.title;
        document.getElementById('playerArtistName').textContent = track.artist;
        fetch('/api/track/play', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ track_id: parseInt(trackId) }) });
      }).catch(() => { document.getElementById('trackHeader').innerHTML = '<div class="error-state">Ошибка загрузки трека</div>'; });
    }

    function checkUserLike() {
      fetch(`/api/track/${trackId}/likes?user_id=${currentUser.id}`).then(r => r.json()).then(data => { likesCount = data.likes; isLiked = data.is_liked; updateLikeButton(); });
    }
    function updateLikeButton() {
      const btn = document.getElementById('likeBtn');
      document.getElementById('likeCount').textContent = likesCount;
      if (isLiked) { btn.classList.add('liked'); document.getElementById('likeIcon').textContent = '💔'; document.getElementById('likeText').textContent = 'Не нравится'; }
      else { btn.classList.remove('liked'); document.getElementById('likeIcon').textContent = '❤️'; document.getElementById('likeText').textContent = 'Нравится'; }
    }
    function toggleLike() {
      if (!currentUser) { window.location.href = '/pages/login.html'; return; }
      fetch('/api/track/like', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: currentUser.id, track_id: parseInt(trackId), action: isLiked ? 'unlike' : 'like' }) })
        .then(r => r.json()).then(data => { if (data.success) { likesCount = data.likes; isLiked = data.is_liked; updateLikeButton(); } });
    }

    function setupCommentForm() {
      document.getElementById('commentFormWrapper').innerHTML = `<div class="comment-form"><textarea id="commentText" placeholder="Напишите комментарий..." rows="3"></textarea><div class="comment-form-actions"><span class="comment-hint">Ctrl+Enter для отправки</span><button class="btn-send-comment" id="sendCommentBtn" onclick="addComment()">Отправить</button></div><div class="comment-status" id="commentStatus"></div></div>`;
      document.getElementById('commentText').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); addComment(); } });
    }
    function addComment() {
      const text = document.getElementById('commentText').value.trim();
      if (!text || text.length < 2) { document.getElementById('commentStatus').textContent = 'Слишком коротко'; document.getElementById('commentStatus').style.color = 'var(--error)'; return; }
      const btn = document.getElementById('sendCommentBtn'); btn.disabled = true; btn.textContent = 'Отправка...';
      fetch('/api/track/comment', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: currentUser.id, track_id: parseInt(trackId), comment_text: text }) })
        .then(r => r.json()).then(data => {
          if (data.success) { document.getElementById('commentText').value = ''; document.getElementById('commentStatus').textContent = '✅ Отправлено!'; document.getElementById('commentStatus').style.color = 'var(--accent)'; loadComments(); setTimeout(() => document.getElementById('commentStatus').textContent = '', 3000); }
          else { document.getElementById('commentStatus').textContent = '❌ Ошибка'; document.getElementById('commentStatus').style.color = 'var(--error)'; }
        }).catch(() => { document.getElementById('commentStatus').textContent = '❌ Ошибка соединения'; document.getElementById('commentStatus').style.color = 'var(--error)'; })
        .finally(() => { btn.disabled = false; btn.textContent = 'Отправить'; });
    }

    function loadComments() { fetch(`/api/track/${trackId}/comments`).then(r => r.json()).then(c => displayComments(c)).catch(() => {}); }
    function loadCommentsSilently() { fetch(`/api/track/${trackId}/comments`).then(r => r.json()).then(c => displayComments(c)).catch(() => {}); }
    function displayComments(comments) {
      document.getElementById('commentsCount').textContent = comments.length;
      document.getElementById('commentsList').innerHTML = !comments.length ? '<div class="empty-state">Нет комментариев. Будьте первым!</div>' :
        [...comments].reverse().map(c => `<div class="comment-item"><div class="comment-avatar">${c.username.charAt(0).toUpperCase()}</div><div class="comment-content"><div class="comment-header"><a href="/pages/profile.html?user_id=${c.user_id}" class="comment-username">${escapeHtml(c.username)}</a><span class="comment-time">${timeAgo(c.date)}</span></div><div class="comment-text">${escapeHtml(c.text)}</div></div></div>`).join('');
    }

    function setupPlayers() {
      const big = document.getElementById('bigAudioPlayer'), bottom = document.getElementById('bottomAudioPlayer');
      big.addEventListener('timeupdate', () => { if (big.duration) { document.getElementById('bigProgressFill').style.width = (big.currentTime/big.duration)*100+'%'; document.getElementById('currentTime').textContent = formatTime(big.currentTime); document.getElementById('totalTime').textContent = formatTime(big.duration); } });
      big.addEventListener('play', () => document.getElementById('bigPlayIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>');
      big.addEventListener('pause', () => document.getElementById('bigPlayIcon').innerHTML = '<path d="M8 5v14l11-7z"/>');
      bottom.addEventListener('timeupdate', () => { if (bottom.duration) document.getElementById('bottomProgressFill').style.width = (bottom.currentTime/bottom.duration)*100+'%'; });
      bottom.addEventListener('play', () => document.getElementById('bottomPlayIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>');
      bottom.addEventListener('pause', () => document.getElementById('bottomPlayIcon').innerHTML = '<path d="M8 5v14l11-7z"/>');
      bottom.addEventListener('ended', () => bottomPlayer.next());
    }

    function toggleBigPlayer() { const a = document.getElementById('bigAudioPlayer'); a.paused ? (a.play(), document.getElementById('playerTrackName').textContent = trackData?.title||'', document.getElementById('playerArtistName').textContent = trackData?.artist||'') : a.pause(); }
    function seekBigPlayer(e) { const a = document.getElementById('bigAudioPlayer'); if (!a.duration) return; a.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.getBoundingClientRect().width) * a.duration; }

    const bottomPlayer = {
      play(trackId, fp, t, a) { const au = document.getElementById('bottomAudioPlayer'); au.src = fp; au.play(); document.getElementById('playerTrackName').textContent = t||''; document.getElementById('playerArtistName').textContent = a||''; },
      togglePlay() { const a = document.getElementById('bottomAudioPlayer'); a.paused ? a.play() : a.pause(); },
      next() { if (!playlist.length) return; currentTrackIndex = (currentTrackIndex+1)%playlist.length; const t = playlist[currentTrackIndex]; this.play(t.id, t.filePath, t.title, t.artist); },
      previous() { if (!playlist.length) return; currentTrackIndex = currentTrackIndex<=0?playlist.length-1:currentTrackIndex-1; const t = playlist[currentTrackIndex]; this.play(t.id, t.filePath, t.title, t.artist); },
      seek(e) { const a = document.getElementById('bottomAudioPlayer'); if (!a.duration) return; a.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.getBoundingClientRect().width) * a.duration; },
      setVolume(e) { const a = document.getElementById('bottomAudioPlayer'); const v = (e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.getBoundingClientRect().width; a.volume = Math.max(0,Math.min(1,v)); document.getElementById('bottomVolumeFill').style.width = (v*100)+'%'; }
    };

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'}) : ''; }
    function timeAgo(d) { const diff = Date.now() - new Date(d).getTime(), m = Math.floor(diff/60000), h = Math.floor(diff/3600000), days = Math.floor(diff/86400000); if (m<1) return 'только что'; if (m<60) return `${m} мин. назад`; if (h<24) return `${h} ч. назад`; if (days<7) return `${days} дн. назад`; return formatDate(d); }
    function formatTime(s) { if (!s||isNaN(s)) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
  </script>
</body>
</html>
