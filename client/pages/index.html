<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Clone - Главная</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/communities.html">Сообщества</a>
            <span id="authLinks">
                <a href="/pages/login.html">Войти</a>
                <a href="/pages/register.html">Регистрация</a>
            </span>
            <span id="userLinks" style="display: none;">
                <a href="/pages/profile.html">Профиль</a>
                <a href="/pages/upload.html">Загрузить</a>
                <button onclick="logout()">Выйти</button>
            </span>
        </nav>
    </header>

    <main>
        <section>
            <h2>Поиск треков</h2>
            <input type="text" id="searchInput" placeholder="Поиск по названию или исполнителю...">
            <button onclick="searchTracks()">Поиск</button>
        </section>

        <section>
            <h2>Все треки</h2>
            <div id="tracksList">
                <p>Загрузка треков...</p>
            </div>
        </section>
    </main>

    <script src="/src/chat.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadAllTracks();
        });

        function loadAllTracks() {
            fetch('/api/tracks')
                .then(response => response.json())
                .then(tracks => {
                    displayTracks(tracks, 'tracksList');
                })
                .catch(error => {
                    console.error('Ошибка загрузки треков:', error);
                    document.getElementById('tracksList').innerHTML = '<p>Ошибка загрузки треков</p>';
                });
        }

        function searchTracks() {
            const query = document.getElementById('searchInput').value;
            fetch(`/api/tracks?search=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(tracks => {
                    displayTracks(tracks, 'tracksList');
                })
                .catch(error => {
                    console.error('Ошибка поиска:', error);
                });
        }

        function displayTracks(tracks, containerId) {
            const container = document.getElementById(containerId);
            
            if (!tracks || tracks.length === 0) {
                container.innerHTML = '<p>Треки не найдены</p>';
                return;
            }

            container.innerHTML = tracks.map(track => `
                <div class="track-item" data-track-id="${track.id}">
                    <h3>
                        <a href="/pages/track.html?id=${track.id}">${track.title}</a>
                    </h3>
                    <p>Исполнитель: ${track.artist}</p>
                    <p>Жанр: ${track.genre || 'Не указан'}</p>
                    <p>Прослушиваний: ${track.plays_count}</p>
                    <button onclick="playTrack(${track.id}, '${track.file_path}')">▶ Воспроизвести</button>
                </div>
                <hr>
            `).join('');
        }
    </script>
</body>
</html>
