<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Музыка — Главная</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1e1e1e;
      --bg-nav: #141414;
      --bg-player: #111111;
      --surface: #2a2a2a;
      --surface-hover: #333333;
      --accent: #3dc8a0;
      --accent-btn: #2fb890;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #666666;
      --border: #333333;
      --radius-card: 14px;
      --radius-pill: 999px;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-nav);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      height: 56px;
    }
    .nav-home-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: background 0.15s;
      flex-shrink: 0;
      text-decoration: none;
    }
    .nav-home-btn:hover { background: var(--surface); }
    .nav-home-btn svg { width: 20px; height: 20px; fill: currentColor; }
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      fill: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--text-primary);
      font-size: 14px;
      padding: 8px 16px 8px 38px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent); }
    .nav-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius-pill);
      padding: 7px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline:hover { background: var(--accent); color: #000; }
    .btn-fill {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #000;
      border-radius: var(--radius-pill);
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-fill:hover { background: var(--accent-btn); }
    .btn-small { padding: 4px 12px; font-size: 11px; }
    main { flex: 1; overflow-y: auto; padding: 28px 24px 120px; }
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: 0.2px;
      text-align: center;
    }
    .cards-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
      justify-content: center;
      flex-wrap: wrap;
    }
    .cards-row::-webkit-scrollbar { display: none; }
    .card {
      flex-shrink: 0;
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    .card:hover { transform: scale(1.03); background: var(--surface-hover); }
    .card-track {
      width: 160px;
      padding: 12px;
    }
    .card-track .track-art {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .card-track .track-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-track .track-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-track .track-artist {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-track .track-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .card-artist {
      width: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: transparent;
      padding: 4px;
      border-radius: 0;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card-artist:hover { background: transparent; transform: scale(1.04); }
    .card-artist .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-artist .avatar .avatar-text {
      font-size: 32px;
      color: var(--text-secondary);
    }
    .card-artist .name {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--bg-player);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
      z-index: 100;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 200px;
      max-width: 300px;
    }
    .player-info .track-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-info .track-artist-small {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .player-controls { display: flex; align-items: center; gap: 20px; }
    .player-controls button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      transition: color 0.15s;
    }
    .player-controls button:hover { color: var(--text-primary); }
    .player-controls .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-controls .play-btn:hover { background: var(--accent-btn); color: #000; }
    .player-controls svg { width: 18px; height: 18px; fill: currentColor; }
    .player-controls .play-btn svg { width: 16px; height: 16px; }
    .player-progress { flex: 1; max-width: 480px; }
    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--surface);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.1s linear;
    }
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .player-volume svg { width: 18px; height: 18px; fill: currentColor; }
    .volume-bar { width: 80px; height: 3px; background: var(--surface); border-radius: 3px; cursor: pointer; }
    .volume-fill { height: 100%; width: 65%; background: var(--text-secondary); border-radius: 3px; }
    .loading-text { color: var(--text-muted); font-size: 14px; padding: 20px; text-align: center; width: 100%; }
    .error-text { color: #ff6b6b; font-size: 14px; padding: 20px; text-align: center; width: 100%; }
  </style>
</head>
<body>

  <nav>
    <a href="/pages/index.html" class="nav-home-btn" title="Главная">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="ищите что душе угодно..." />
    </div>
    <div class="nav-actions" id="authLinks">
      <a href="/pages/login.html" class="btn-outline">Войти</a>
      <a href="/pages/register.html" class="btn-fill">Регистрация</a>
    </div>
    <div class="nav-actions" id="userLinks" style="display: none;">
      <a href="/pages/communities.html" class="btn-outline btn-small">Сообщества</a>
      <a href="/pages/profile.html" class="btn-outline btn-small">Профиль</a>
      <button class="btn-outline btn-small" onclick="logout()">Выйти</button>
    </div>
  </nav>

  <main>
    <section class="section">
      <h2 class="section-title">🔥 Популярное</h2>
      <div class="cards-row" id="popularRow"><div class="loading-text">Загрузка...</div></div>
    </section>
    <section class="section">
      <h2 class="section-title">❤️ Больше всего лайков</h2>
      <div class="cards-row" id="mostLikedRow"><div class="loading-text">Загрузка...</div></div>
    </section>
    <section class="section">
      <h2 class="section-title">▶️ Больше всего прослушиваний</h2>
      <div class="cards-row" id="mostPlayedRow"><div class="loading-text">Загрузка...</div></div>
    </section>
    <section class="section">
      <h2 class="section-title">🎵 Все треки</h2>
      <div class="cards-row" id="tracksRow"><div class="loading-text">Загрузка треков...</div></div>
    </section>
    <section class="section">
      <h2 class="section-title">👤 Исполнители</h2>
      <div class="cards-row" id="artistsRow"><div class="loading-text">Загрузка исполнителей...</div></div>
    </section>
  </main>

  <div class="player" id="playerBar">
    <div class="player-info">
      <div>
        <div class="track-name" id="playerTrackName">Нет трека</div>
        <div class="track-artist-small" id="playerArtistName">Выберите трек</div>
      </div>
    </div>
    <div class="player-controls">
      <button onclick="playerControls.previous()" title="Назад">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" onclick="playerControls.togglePlay()" title="Воспроизвести" id="playPauseBtn">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button onclick="playerControls.next()" title="Вперёд">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="player-progress">
      <div class="progress-bar" onclick="playerControls.seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="player-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <div class="volume-bar" onclick="playerControls.setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let allTracks = [];
    let playlist = [];
    let currentTrackIndex = -1;

    window.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadAllTracks();
      loadPopularTracks();
      loadMostLikedTracks();
      loadMostPlayedTracks();
      loadArtists();
      setupPlayer();
      setupSearch();
    });

    function checkAuth() {
      const authLinks = document.getElementById('authLinks');
      const userLinks = document.getElementById('userLinks');
      if (currentUser) {
        if (authLinks) authLinks.style.display = 'none';
        if (userLinks) userLinks.style.display = 'flex';
      } else {
        if (authLinks) authLinks.style.display = 'flex';
        if (userLinks) userLinks.style.display = 'none';
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = '/pages/index.html';
    }

    function loadPopularTracks() {
      fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
          const popular = [...tracks]
            .sort((a, b) => (b.plays_count + (b.likes || 0)) - (a.plays_count + (a.likes || 0)))
            .slice(0, 6);
          displayTracks(popular, 'popularRow');
        })
        .catch(error => {
          document.getElementById('popularRow').innerHTML = '<div class="error-text">Ошибка загрузки</div>';
        });
    }

    function loadMostLikedTracks() {
      fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
          const likesPromises = tracks.map(track =>
            fetch(`/api/track/${track.id}/likes`)
              .then(r => r.json())
              .then(data => ({...track, likes: data.likes}))
              .catch(() => ({...track, likes: 0}))
          );
          return Promise.all(likesPromises);
        })
        .then(tracksWithLikes => {
          const mostLiked = tracksWithLikes.sort((a, b) => b.likes - a.likes).slice(0, 6);
          displayTracks(mostLiked, 'mostLikedRow');
        })
        .catch(error => {
          document.getElementById('mostLikedRow').innerHTML = '<div class="error-text">Ошибка загрузки</div>';
        });
    }

    function loadMostPlayedTracks() {
      fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
          const mostPlayed = [...tracks].sort((a, b) => b.plays_count - a.plays_count).slice(0, 6);
          displayTracks(mostPlayed, 'mostPlayedRow');
        })
        .catch(error => {
          document.getElementById('mostPlayedRow').innerHTML = '<div class="error-text">Ошибка загрузки</div>';
        });
    }

    function loadAllTracks() {
      fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
          allTracks = tracks;
          displayTracks(tracks, 'tracksRow');
        })
        .catch(error => {
          document.getElementById('tracksRow').innerHTML = '<div class="error-text">Ошибка загрузки треков</div>';
        });
    }

    function displayTracks(tracks, containerId) {
      const container = document.getElementById(containerId);
      if (!tracks || tracks.length === 0) {
        container.innerHTML = '<div class="loading-text">Треки не найдены</div>';
        return;
      }
      container.innerHTML = tracks.map(track => `
        <a href="/pages/track.html?id=${track.id}" class="card card-track" data-track-id="${track.id}">
          <div class="track-art">
            ${track.cover_path 
              ? `<img src="${track.cover_path}" alt="${escapeHtml(track.title)}" />`
              : `<span style="font-size: 32px;">🎵</span>`
            }
          </div>
          <div class="track-title">${escapeHtml(track.title)}</div>
          <div class="track-artist">${escapeHtml(track.artist)}</div>
          <div class="track-meta">
            ${track.genre || 'Без жанра'} · ▶ ${track.plays_count}
            ${track.likes !== undefined ? ` · ❤️ ${track.likes}` : ''}
          </div>
        </a>
      `).join('');
    }

    function loadArtists() {
      fetch('/api/tracks')
        .then(response => response.json())
        .then(tracks => {
          const artists = {};
          tracks.forEach(track => {
            if (track.artist_id && !artists[track.artist_id]) {
              artists[track.artist_id] = { id: track.artist_id, name: track.artist };
            }
          });
          displayArtists(Object.values(artists));
        })
        .catch(error => {
          document.getElementById('artistsRow').innerHTML = '<div class="error-text">Ошибка загрузки</div>';
        });
    }

    function displayArtists(artists) {
      const container = document.getElementById('artistsRow');
      if (!artists || artists.length === 0) {
        container.innerHTML = '<div class="loading-text">Нет исполнителей</div>';
        return;
      }
      container.innerHTML = artists.slice(0, 10).map(artist => `
        <div class="card-artist" onclick="window.location.href='/pages/profile.html?user_id=${artist.id}'">
          <div class="avatar"><span class="avatar-text">${artist.name.charAt(0).toUpperCase()}</span></div>
          <span class="name">${escapeHtml(artist.name)}</span>
        </div>
      `).join('');
    }

    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const query = searchInput.value.trim();
          if (query) window.location.href = `/pages/search.html?q=${encodeURIComponent(query)}`;
        }
      });
      const searchIcon = document.querySelector('.search-wrap svg');
      if (searchIcon) {
        searchIcon.style.cursor = 'pointer';
        searchIcon.addEventListener('click', () => {
          const query = searchInput.value.trim();
          if (query) window.location.href = `/pages/search.html?q=${encodeURIComponent(query)}`;
        });
      }
    }

    function setupPlayer() {
      const audioPlayer = document.getElementById('audioPlayer');
      audioPlayer.addEventListener('timeupdate', () => {
        const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
      });
      audioPlayer.addEventListener('ended', () => playerControls.next());
      audioPlayer.addEventListener('play', () => {
        document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      });
      audioPlayer.addEventListener('pause', () => {
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
      });
    }

    const playerControls = {
      playTrack(trackId, filePath, title, artist) {
        const audioPlayer = document.getElementById('audioPlayer');
        const trackExists = playlist.find(t => t.id === trackId);
        if (!trackExists) playlist.push({ id: trackId, filePath, title, artist });
        currentTrackIndex = playlist.findIndex(t => t.id === trackId);
        audioPlayer.src = filePath;
        audioPlayer.play();
        document.getElementById('playerTrackName').textContent = title || 'Неизвестный трек';
        document.getElementById('playerArtistName').textContent = artist || 'Неизвестный исполнитель';
        fetch('/api/track/play', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ track_id: trackId })
        });
      },
      togglePlay() {
        const audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause();
      },
      next() {
        if (playlist.length === 0) return;
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },
      previous() {
        if (playlist.length === 0) return;
        currentTrackIndex = currentTrackIndex <= 0 ? playlist.length - 1 : currentTrackIndex - 1;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },
      seek(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        const progressBar = event.currentTarget;
        const rect = progressBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = percent * audioPlayer.duration;
      },
      setVolume(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        const volumeBar = event.currentTarget;
        const rect = volumeBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.volume = Math.max(0, Math.min(1, percent));
        document.getElementById('volumeFill').style.width = (percent * 100) + '%';
      }
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
