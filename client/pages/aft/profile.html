<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — SoundCloud Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #252525;
      --bg-header: #2e2e2e;
      --bg-player: #111111;
      --surface: #3a3a3a;
      --accent: #3dc8a0;
      --accent-btn: #2fb890;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #666666;
      --border: #333333;
      --radius-pill: 999px;
      --radius-card: 14px;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* PROFILE HEADER AREA */
    .profile-header {
      background: var(--bg-header);
      padding: 32px 40px 40px;
      position: relative;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .home-btn {
      position: absolute;
      top: 20px; left: 24px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      text-decoration: none;
    }
    .home-btn:hover { background: var(--accent-btn); }
    .home-btn svg { width: 20px; height: 20px; fill: #000; }

    .logout-btn {
      position: absolute;
      top: 24px; right: 24px;
      background: transparent;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      border-radius: var(--radius-pill);
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .logout-btn:hover {
      border-color: #ff4444;
      color: #ff4444;
    }

    .avatar-wrap {
      flex-shrink: 0;
      margin-top: 24px;
    }
    .avatar-placeholder {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      color: var(--text-secondary);
    }

    .profile-info {
      flex: 1;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .username {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    .user-details {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .user-details span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .badge {
      background: var(--accent);
      color: #000;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-warning {
      background: #ff6b35;
    }

    .profile-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-subscribe {
      background: transparent;
      border: 1px solid var(--text-secondary);
      color: var(--text-primary);
      border-radius: var(--radius-pill);
      padding: 9px 24px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .btn-subscribe:hover {
      border-color: var(--text-primary);
      background: rgba(255,255,255,0.05);
    }

    .btn-communities {
      background: var(--surface);
      border: none;
      color: var(--text-primary);
      border-radius: var(--radius-pill);
      padding: 9px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: background 0.15s;
      margin-left: auto;
      text-decoration: none;
      display: inline-block;
    }
    .btn-communities:hover { background: #444; }

    .btn-upload {
      background: var(--accent);
      border: none;
      color: #000;
      border-radius: var(--radius-pill);
      padding: 9px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn-upload:hover { background: var(--accent-btn); }

    /* CONTENT AREA */
    main {
      flex: 1;
      padding: 32px 40px 120px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .tracks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .track-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .track-card:hover {
      transform: translateY(-2px);
      background: #444;
    }

    .track-card .track-icon {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 40px;
    }

    .track-card .track-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-card .track-genre {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .track-card .track-stats {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .communities-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .community-item {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .community-item:hover { background: #444; }

    .community-item .community-name {
      font-size: 15px;
      font-weight: 600;
    }

    .community-item .community-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-size: 15px;
      flex-direction: column;
      gap: 12px;
    }

    .loading-text {
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .error-text {
      color: #ff6b6b;
      text-align: center;
      padding: 40px;
    }

    /* PLAYER */
    .player {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: var(--bg-player); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px; z-index: 100;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 200px;
      max-width: 300px;
    }
    .player-info .track-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-info .track-artist-small {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .player-controls { display: flex; align-items: center; gap: 20px; }
    .player-controls button {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); display: flex; align-items: center;
      transition: color 0.15s;
    }
    .player-controls button:hover { color: var(--text-primary); }
    .player-controls .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .player-controls .play-btn:hover { background: var(--accent-btn); }
    .player-controls svg { width: 18px; height: 18px; fill: currentColor; }
    .player-controls .play-btn svg { width: 16px; height: 16px; }
    .player-progress { flex: 1; max-width: 480px; }
    .progress-bar {
      width: 100%; height: 3px; background: #333;
      border-radius: 3px; overflow: hidden; cursor: pointer;
    }
    .progress-fill { 
      height: 100%; 
      width: 0%; 
      background: var(--accent); 
      border-radius: 3px;
      transition: width 0.1s linear;
    }
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .player-volume svg { width: 18px; height: 18px; fill: currentColor; }
    .volume-bar { width: 80px; height: 3px; background: #333; border-radius: 3px; cursor: pointer; }
    .volume-fill { height: 100%; width: 65%; background: var(--text-secondary); border-radius: 3px; }
  </style>
</head>
<body>

  <div class="profile-header">
    <a href="/pages/index.html" class="home-btn" title="Главная">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>

    <button class="logout-btn" onclick="logout()">Выйти</button>

    <div class="avatar-wrap">
      <div class="avatar-placeholder" id="avatarLetter">?</div>
    </div>

    <div class="profile-info">
      <h1 class="username" id="profileUsername">Загрузка...</h1>
      <div class="user-details" id="userDetails"></div>
      <div class="profile-actions" id="profileActions"></div>
    </div>
  </div>

  <main>
    <div id="tracksSection">
      <h2 class="section-title">🎵 Треки</h2>
      <div id="tracksContainer">
        <div class="loading-text">Загрузка треков...</div>
      </div>
    </div>

    <div id="communitiesSection">
      <h2 class="section-title">👥 Сообщества</h2>
      <div id="communitiesContainer">
        <div class="loading-text">Загрузка сообществ...</div>
      </div>
    </div>
  </main>

  <!-- PLAYER BAR -->
  <div class="player">
    <div class="player-info">
      <div>
        <div class="track-name" id="playerTrackName">Нет трека</div>
        <div class="track-artist-small" id="playerArtistName">Выберите трек</div>
      </div>
    </div>
    <div class="player-controls">
      <button onclick="playerControls.previous()" title="Назад">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" onclick="playerControls.togglePlay()" title="Воспроизвести">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button onclick="playerControls.next()" title="Вперёд">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="player-progress">
      <div class="progress-bar" onclick="playerControls.seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="player-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <div class="volume-bar" onclick="playerControls.setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script>
    let profileUserId = null;
    let currentUser = null;
    let playlist = [];
    let currentTrackIndex = -1;

    window.addEventListener('DOMContentLoaded', () => {
      currentUser = JSON.parse(localStorage.getItem('currentUser'));
      
      if (!currentUser) {
        window.location.href = '/pages/login.html';
        return;
      }
      
      // Проверяем, чей профиль смотрим
      const urlParams = new URLSearchParams(window.location.search);
      profileUserId = urlParams.get('user_id') || currentUser.id;
      
      loadUserProfile();
      loadUserTracks();
      loadUserCommunities();
      setupPlayer();
    });

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = '/pages/index.html';
    }

    function loadUserProfile() {
      fetch(`/api/user/info/${profileUserId}`)
        .then(response => response.json())
        .then(user => {
          // Аватар
          const firstLetter = user.username.charAt(0).toUpperCase();
          document.getElementById('avatarLetter').textContent = firstLetter;
          
          // Имя
          document.getElementById('profileUsername').textContent = user.username;
          
          // Детали
          const detailsHtml = [];
          detailsHtml.push(`<span>📧 ${user.email}</span>`);
          detailsHtml.push(`<span>📅 ${formatDate(user.registration_date)}</span>`);
          
          if (user.user_type === 'musician') {
            detailsHtml.push('<span class="badge">🎵 Музыкант</span>');
          } else {
            detailsHtml.push('<span class="badge">👤 Слушатель</span>');
          }
          
          if (user.is_foreign_agent) {
            detailsHtml.push('<span class="badge badge-warning">⚠️ Иностранный агент</span>');
          }
          
          document.getElementById('userDetails').innerHTML = detailsHtml.join('');
          
          // Кнопки действий
          const actionsHtml = [];
          
          if (profileUserId == currentUser.id) {
            // Это свой профиль
            if (user.user_type === 'musician') {
              actionsHtml.push(`
                <a href="/pages/upload.html" class="btn-upload">Загрузить трек</a>
              `);
            }
            actionsHtml.push(`
              <a href="/pages/communities.html" class="btn-communities">Сообщества</a>
            `);
          } else {
            // Чужой профиль
            actionsHtml.push(`
              <button class="btn-subscribe" onclick="subscribeToUser()">подписаться</button>
            `);
          }
          
          document.getElementById('profileActions').innerHTML = actionsHtml.join('');
        })
        .catch(error => {
          console.error('Ошибка загрузки профиля:', error);
          document.getElementById('profileUsername').textContent = 'Ошибка загрузки';
        });
    }

    function loadUserTracks() {
      fetch(`/api/user/tracks/${profileUserId}`)
        .then(response => response.json())
        .then(tracks => {
          const container = document.getElementById('tracksContainer');
          
          if (!tracks || tracks.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <p>Здесь пока ничего нет</p>
                ${profileUserId == currentUser?.id && currentUser?.user_type === 'musician' ? 
                  '<a href="/pages/upload.html" class="btn-upload">Загрузить первый трек</a>' : ''}
              </div>
            `;
            return;
          }
          
          container.innerHTML = `
            <div class="tracks-grid">
              ${tracks.map(track => `
                <a href="/pages/track.html?id=${track.id}" class="track-card">
                  <div class="track-icon">🎵</div>
                  <div class="track-title">${escapeHtml(track.title)}</div>
                  <div class="track-genre">${track.genre || 'Без жанра'}</div>
                  <div class="track-stats">
                    <span>▶ ${track.plays_count}</span>
                    <span>${formatDate(track.upload_date)}</span>
                  </div>
                </a>
              `).join('')}
            </div>
          `;
        })
        .catch(error => {
          console.error('Ошибка загрузки треков:', error);
          document.getElementById('tracksContainer').innerHTML = 
            '<div class="error-text">Ошибка загрузки треков</div>';
        });
    }

    function loadUserCommunities() {
      fetch(`/api/user/communities/${profileUserId}`)
        .then(response => response.json())
        .then(communities => {
          const container = document.getElementById('communitiesContainer');
          
          if (!communities || communities.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <p>Не состоит в сообществах</p>
                <a href="/pages/communities.html" class="btn-communities">Найти сообщества</a>
              </div>
            `;
            return;
          }
          
          container.innerHTML = `
            <div class="communities-list">
              ${communities.map(community => `
                <a href="/pages/community.html?id=${community.id}" class="community-item">
                  <div>
                    <div class="community-name">${escapeHtml(community.name)}</div>
                    <div class="community-meta">${escapeHtml(community.description || 'Нет описания')}</div>
                  </div>
                  <div class="community-meta">👥 ${community.members_count}</div>
                </a>
              `).join('')}
            </div>
          `;
        })
        .catch(error => {
          console.error('Ошибка загрузки сообществ:', error);
          document.getElementById('communitiesContainer').innerHTML = 
            '<div class="error-text">Ошибка загрузки сообществ</div>';
        });
    }

    function subscribeToUser() {
      alert('Функция подписки будет доступна в следующем обновлении');
    }

    // Плеер
    function setupPlayer() {
      const audioPlayer = document.getElementById('audioPlayer');
      
      audioPlayer.addEventListener('timeupdate', () => {
        if (audioPlayer.duration) {
          const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
          document.getElementById('progressFill').style.width = progress + '%';
        }
      });

      audioPlayer.addEventListener('ended', () => {
        playerControls.next();
      });

      audioPlayer.addEventListener('play', () => {
        document.getElementById('playIcon').innerHTML = 
          '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      });

      audioPlayer.addEventListener('pause', () => {
        document.getElementById('playIcon').innerHTML = 
          '<path d="M8 5v14l11-7z"/>';
      });
    }

    const playerControls = {
      playTrack(trackId, filePath, title, artist) {
        const audioPlayer = document.getElementById('audioPlayer');
        
        const trackExists = playlist.find(t => t.id === trackId);
        if (!trackExists) {
          playlist.push({ id: trackId, filePath, title, artist });
        }
        
        currentTrackIndex = playlist.findIndex(t => t.id === trackId);
        audioPlayer.src = filePath;
        audioPlayer.play();
        
        document.getElementById('playerTrackName').textContent = title || 'Неизвестный трек';
        document.getElementById('playerArtistName').textContent = artist || 'Неизвестный исполнитель';
        
        fetch('/api/track/play', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ track_id: trackId })
        });
      },

      togglePlay() {
        const audioPlayer = document.getElementById('audioPlayer');
        if (audioPlayer.paused) {
          audioPlayer.play();
        } else {
          audioPlayer.pause();
        }
      },

      next() {
        if (playlist.length === 0) return;
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },

      previous() {
        if (playlist.length === 0) return;
        currentTrackIndex = currentTrackIndex <= 0 ? playlist.length - 1 : currentTrackIndex - 1;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },

      seek(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        if (!audioPlayer.duration) return;
        const progressBar = event.currentTarget;
        const rect = progressBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = percent * audioPlayer.duration;
      },

      setVolume(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        const volumeBar = event.currentTarget;
        const rect = volumeBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.volume = Math.max(0, Math.min(1, percent));
        document.getElementById('volumeFill').style.width = (percent * 100) + '%';
      }
    };

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      return date.toLocaleDateString('ru-RU', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }
  </script>
</body>
</html>
