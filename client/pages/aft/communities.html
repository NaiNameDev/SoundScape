<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сообщества — SoundCloud Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #2a2a2a;
      --bg-player: #111;
      --surface: #333;
      --surface-hover: #3d3d3d;
      --accent: #3dc8a0;
      --accent-btn: #2fb890;
      --text-primary: #fff;
      --text-secondary: #aaa;
      --text-muted: #666;
      --border: #3a3a3a;
      --radius-pill: 999px;
      --radius-card: 10px;
      --error: #ff6b6b;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: var(--bg);
      position: sticky; top: 0; z-index: 50;
    }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s; text-decoration: none;
    }
    .icon-btn:hover { opacity: 0.85; }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .btn-home { background: var(--accent); color: #000; }
    .btn-profile { background: var(--accent); color: #000; }

    .search-wrap {
      flex: 1; max-width: 460px; position: relative; display: flex; gap: 8px;
    }
    .search-input-wrap {
      flex: 1; position: relative;
    }
    .search-input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; fill: var(--text-secondary); pointer-events: none;
    }
    .search-input-wrap input {
      width: 100%; background: var(--surface);
      border: none; border-radius: var(--radius-pill);
      color: var(--text-primary); font-size: 15px;
      padding: 10px 16px 10px 42px; outline: none;
    }
    .search-input-wrap input::placeholder { color: var(--text-secondary); }
    .search-input-wrap input:focus { outline: 1px solid var(--accent); }

    .btn-search {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      color: #000;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-search:hover { background: var(--accent-btn); }

    .btn-create-community {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius-pill);
      color: var(--accent);
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-create-community:hover { background: var(--accent); color: #000; }

    main { flex: 1; overflow-y: auto; padding: 24px 20px 120px; }

    .section-title {
      font-size: 22px; font-weight: 600; margin-bottom: 20px;
    }

    .results-stats {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      margin-top: -12px;
    }

    .result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 12px; border-radius: var(--radius-card);
      cursor: pointer; transition: background 0.15s;
      text-decoration: none; color: inherit;
    }
    .result-item:hover { background: var(--surface-hover); }

    .result-thumb {
      width: 52px; height: 52px; border-radius: 8px;
      background: #444; flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    .result-info { flex: 1; min-width: 0; }
    .result-name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-meta {
      font-size: 13px; color: var(--text-secondary); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-extra {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .empty {
      color: var(--text-muted); font-size: 15px;
      padding: 40px 0; text-align: center;
    }

    .loading {
      color: var(--text-muted); font-size: 14px;
      padding: 20px 0; text-align: center;
    }

    .error {
      color: var(--error); font-size: 14px;
      padding: 20px 0; text-align: center;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.active { display: flex; }

    .create-form {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .create-form h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .create-form input,
    .create-form textarea {
      width: 100%;
      background: #444;
      border: none;
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }
    .create-form input::placeholder,
    .create-form textarea::placeholder { color: var(--text-secondary); }
    .create-form input:focus,
    .create-form textarea:focus { outline: 1px solid var(--accent); }

    .create-form textarea {
      min-height: 80px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-pill);
      color: var(--text-secondary);
      padding: 8px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover {
      border-color: var(--text-primary);
      color: var(--text-primary);
    }

    .btn-create {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      color: #000;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-create:hover { background: var(--accent-btn); }
    .btn-create:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .form-error {
      color: var(--error);
      font-size: 12px;
      min-height: 18px;
    }

    .player {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: var(--bg-player); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px; z-index: 100;
    }
    .player-info {
      display: flex; align-items: center; gap: 12px;
      min-width: 200px; max-width: 300px;
    }
    .player-info .track-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-info .track-artist-small {
      font-size: 11px; color: var(--text-secondary);
    }
    .player-controls { display: flex; align-items: center; gap: 20px; }
    .player-controls button {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); display: flex; align-items: center; transition: color 0.15s;
    }
    .player-controls button:hover { color: var(--text-primary); }
    .player-controls .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .player-controls .play-btn:hover { background: var(--accent-btn); }
    .player-controls svg { width: 18px; height: 18px; fill: currentColor; }
    .player-controls .play-btn svg { width: 16px; height: 16px; }
    .player-progress { flex: 1; max-width: 480px; }
    .progress-bar { 
      width: 100%; height: 3px; background: #333; 
      border-radius: 3px; cursor: pointer; overflow: hidden; 
    }
    .progress-fill { 
      height: 100%; width: 0%; background: var(--accent); 
      border-radius: 3px; transition: width 0.1s linear;
    }
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .player-volume svg { width: 18px; height: 18px; fill: currentColor; }
    .volume-bar { width: 80px; height: 3px; background: #333; border-radius: 3px; cursor: pointer; }
    .volume-fill { height: 100%; width: 65%; background: var(--text-secondary); border-radius: 3px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .btn-search { padding: 10px 14px; font-size: 13px; }
      .btn-create-community { padding: 10px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/pages/index.html" class="icon-btn btn-home" title="Главная">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>

    <div class="search-wrap">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск сообществ..." />
      </div>
      <button class="btn-search" onclick="doSearch()">Найти</button>
    </div>

    <button class="btn-create-community" id="createBtn" onclick="showCreateForm()" style="display: none;">
      + Создать
    </button>

    <a href="/pages/profile.html" class="icon-btn btn-profile" title="Профиль">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </a>
  </nav>

  <div class="overlay" id="createOverlay">
    <div class="create-form">
      <h3>Создать сообщество</h3>
      <input type="text" id="communityName" placeholder="Название сообщества" maxlength="50" />
      <textarea id="communityDesc" placeholder="Описание (необязательно)" maxlength="200"></textarea>
      <div class="form-error" id="formError"></div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="hideCreateForm()">Отмена</button>
        <button class="btn-create" id="submitCreateBtn" onclick="createCommunity()">Создать</button>
      </div>
    </div>
  </div>

  <main>
    <div id="myCommunitiesSection" style="display: none;">
      <div class="section-label">✨ Мои сообщества</div>
      <div id="myCommunitiesList"></div>
      <div class="divider"></div>
    </div>

    <h2 class="section-title" id="sectionTitle">Все сообщества</h2>
    <div class="results-stats" id="resultsStats"></div>
    <div id="results">
      <p class="loading">Загрузка сообществ...</p>
    </div>
  </main>

  <div class="player">
    <div class="player-info">
      <div>
        <div class="track-name" id="playerTrackName">Нет трека</div>
        <div class="track-artist-small" id="playerArtistName">Выберите трек</div>
      </div>
    </div>
    <div class="player-controls">
      <button onclick="playerControls.previous()" title="Назад">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" onclick="playerControls.togglePlay()" title="Воспроизвести">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button onclick="playerControls.next()" title="Вперёд">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="player-progress">
      <div class="progress-bar" onclick="playerControls.seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="player-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <div class="volume-bar" onclick="playerControls.setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let allCommunities = [];
    let searchTimeout = null;
    let playlist = [];
    let currentTrackIndex = -1;

    window.addEventListener('DOMContentLoaded', () => {
      setupPlayer();
      
      if (currentUser) {
        document.getElementById('createBtn').style.display = 'inline-block';
        loadMyCommunities();
      }
      
      loadAllCommunities();
      
      // Поиск при вводе (с задержкой)
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => doSearch(), 300);
      });
      
      // Поиск по Enter
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          clearTimeout(searchTimeout);
          doSearch();
        }
      });
      
      searchInput.focus();
    });

    function doSearch() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      
      if (!query) {
        document.getElementById('sectionTitle').textContent = 'Все сообщества';
        displayCommunities(allCommunities, 'results', 'resultsStats', 'сообществ');
        return;
      }
      
      document.getElementById('sectionTitle').textContent = `Поиск: "${query}"`;
      
      const filtered = allCommunities.filter(c => 
        c.name.toLowerCase().includes(query) || 
        (c.description && c.description.toLowerCase().includes(query)) ||
        (c.creator_name && c.creator_name.toLowerCase().includes(query))
      );
      
      displayCommunities(filtered, 'results', 'resultsStats', 'сообществ');
    }

    function showCreateForm() {
      if (!currentUser) {
        window.location.href = '/pages/login.html';
        return;
      }
      document.getElementById('createOverlay').classList.add('active');
      document.getElementById('communityName').focus();
    }

    function hideCreateForm() {
      document.getElementById('createOverlay').classList.remove('active');
      document.getElementById('communityName').value = '';
      document.getElementById('communityDesc').value = '';
      document.getElementById('formError').textContent = '';
    }

    async function createCommunity() {
      const name = document.getElementById('communityName').value.trim();
      const description = document.getElementById('communityDesc').value.trim();
      const errorEl = document.getElementById('formError');
      const submitBtn = document.getElementById('submitCreateBtn');
      
      if (!name) {
        errorEl.textContent = 'Введите название сообщества';
        return;
      }
      
      if (name.length < 3) {
        errorEl.textContent = 'Название должно содержать минимум 3 символа';
        return;
      }
      
      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Создание...';
      
      try {
        const response = await fetch('/api/community/create', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            name: name,
            description: description,
            creator_id: currentUser.id
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          hideCreateForm();
          loadAllCommunities();
          loadMyCommunities();
          
          setTimeout(() => {
            window.location.href = `/pages/community.html?id=${data.community_id}`;
          }, 500);
        } else {
          errorEl.textContent = data.error || 'Ошибка создания';
        }
      } catch (error) {
        console.error('Ошибка:', error);
        errorEl.textContent = 'Ошибка соединения с сервером';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Создать';
      }
    }

    function loadAllCommunities() {
      fetch('/api/communities')
        .then(response => response.json())
        .then(communities => {
          allCommunities = communities;
          const query = document.getElementById('searchInput').value.trim().toLowerCase();
          if (query) {
            doSearch();
          } else {
            displayCommunities(communities, 'results', 'resultsStats', 'сообществ');
          }
        })
        .catch(error => {
          console.error('Ошибка:', error);
          document.getElementById('results').innerHTML = 
            '<p class="error">Ошибка загрузки сообществ</p>';
        });
    }

    function loadMyCommunities() {
      if (!currentUser) return;
      
      fetch(`/api/user/communities/${currentUser.id}`)
        .then(response => response.json())
        .then(communities => {
          const section = document.getElementById('myCommunitiesSection');
          const list = document.getElementById('myCommunitiesList');
          
          if (!communities || communities.length === 0) {
            section.style.display = 'none';
            return;
          }
          
          section.style.display = 'block';
          list.innerHTML = communities.map(c => createCommunityItem(c)).join('');
        })
        .catch(error => console.error('Ошибка:', error));
    }

    function displayCommunities(communities, containerId, statsId, label) {
      const container = document.getElementById(containerId);
      const stats = document.getElementById(statsId);
      
      stats.textContent = `Найдено: ${communities.length} ${label}`;
      
      if (!communities || communities.length === 0) {
        container.innerHTML = '<p class="empty">Ничего не найдено</p>';
        return;
      }
      
      container.innerHTML = communities.map(c => createCommunityItem(c)).join('');
    }

    function createCommunityItem(community) {
      return `
        <a href="/pages/community.html?id=${community.id}" class="result-item">
          <div class="result-thumb">👥</div>
          <div class="result-info">
            <div class="result-name">${escapeHtml(community.name)}</div>
            <div class="result-meta">
              ${community.description ? escapeHtml(community.description) : 'Нет описания'}
            </div>
            <div class="result-extra">
              👥 ${community.members_count || 1} участников · 
              ${community.creator_name ? 'Создатель: ' + escapeHtml(community.creator_name) : ''}
            </div>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--text-muted)">
            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
          </svg>
        </a>
      `;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideCreateForm();
      }
    });

    document.getElementById('createOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        hideCreateForm();
      }
    });

    function setupPlayer() {
      const audioPlayer = document.getElementById('audioPlayer');
      
      audioPlayer.addEventListener('timeupdate', () => {
        if (audioPlayer.duration) {
          const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
          document.getElementById('progressFill').style.width = progress + '%';
        }
      });

      audioPlayer.addEventListener('ended', () => {
        playerControls.next();
      });

      audioPlayer.addEventListener('play', () => {
        document.getElementById('playIcon').innerHTML = 
          '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      });

      audioPlayer.addEventListener('pause', () => {
        document.getElementById('playIcon').innerHTML = 
          '<path d="M8 5v14l11-7z"/>';
      });
    }

    const playerControls = {
      playTrack(trackId, filePath, title, artist) {
        const audioPlayer = document.getElementById('audioPlayer');
        
        const trackExists = playlist.find(t => t.id === trackId);
        if (!trackExists) {
          playlist.push({ id: trackId, filePath, title, artist });
        }
        
        currentTrackIndex = playlist.findIndex(t => t.id === trackId);
        audioPlayer.src = filePath;
        audioPlayer.play();
        
        document.getElementById('playerTrackName').textContent = title || 'Неизвестный трек';
        document.getElementById('playerArtistName').textContent = artist || 'Неизвестный исполнитель';
        
        fetch('/api/track/play', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ track_id: trackId })
        });
      },

      togglePlay() {
        const audioPlayer = document.getElementById('audioPlayer');
        if (audioPlayer.paused) {
          audioPlayer.play();
        } else {
          audioPlayer.pause();
        }
      },

      next() {
        if (playlist.length === 0) return;
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },

      previous() {
        if (playlist.length === 0) return;
        currentTrackIndex = currentTrackIndex <= 0 ? playlist.length - 1 : currentTrackIndex - 1;
        const track = playlist[currentTrackIndex];
        this.playTrack(track.id, track.filePath, track.title, track.artist);
      },

      seek(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        if (!audioPlayer.duration) return;
        const progressBar = event.currentTarget;
        const rect = progressBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = percent * audioPlayer.duration;
      },

      setVolume(event) {
        const audioPlayer = document.getElementById('audioPlayer');
        const volumeBar = event.currentTarget;
        const rect = volumeBar.getBoundingClientRect();
        const percent = (event.clientX - rect.left) / rect.width;
        audioPlayer.volume = Math.max(0, Math.min(1, percent));
        document.getElementById('volumeFill').style.width = (percent * 100) + '%';
      }
    };
  </script>
</body>
</html>
