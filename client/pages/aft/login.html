<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — SoundCloud Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --surface: #3a3a3a;
      --accent: #3dc8a0;
      --accent-dark: #2fb890;
      --text: #ffffff;
      --text-muted: #888888;
      --error: #ff4444;
      --radius-pill: 999px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 340px;
      padding: 24px;
    }
    .screen.active { display: flex; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: none;
      border-radius: var(--radius-pill);
      color: var(--text);
      font-size: 15px;
      padding: 14px 20px;
      outline: none;
      text-align: center;
      transition: background 0.15s;
    }
    input::placeholder { color: #aaa; }
    input:focus { background: #444; }

    .btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      color: #000;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 12px 32px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      width: 100%;
    }
    .btn:hover { background: var(--accent-dark); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .link {
      color: var(--accent);
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .link:hover { text-decoration: underline; }

    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
      z-index: 10;
    }
    .back:hover { color: var(--text); }
    .back svg { width: 16px; height: 16px; fill: currentColor; }

    .error-message {
      color: var(--error);
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    .success-message {
      color: var(--accent);
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    .home-link {
      position: fixed;
      top: 20px;
      right: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      z-index: 10;
      transition: color 0.15s;
    }
    .home-link:hover { color: var(--accent-dark); }
  </style>
</head>
<body>

  <a href="/pages/index.html" class="home-link">🏠 На главную</a>

  <button class="back" id="backBtn" onclick="goBack()">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Назад
  </button>

  <!-- STEP 1: Email -->
  <div class="screen active" id="step1">
    <h1>🎵 Вход</h1>
    <input type="text" id="emailInput" placeholder="введите email или имя пользователя" autocomplete="username" />
    <div class="error-message" id="step1Error"></div>
    <button class="btn" id="step1Btn" onclick="goToStep2()">Далее</button>
    <a class="link" href="/pages/register.html">Нет аккаунта? Зарегистрироваться</a>
  </div>

  <!-- STEP 2: Password -->
  <div class="screen" id="step2">
    <h2>Введите пароль</h2>
    <div style="color: var(--text-muted); font-size: 14px; margin-top: -16px;" id="userDisplay"></div>
    <input type="password" id="passInput" placeholder="пароль" autocomplete="current-password" />
    <div class="error-message" id="step2Error"></div>
    <button class="btn" id="step2Btn" onclick="doLogin()">Войти</button>
    <a class="link" href="#" onclick="alert('Функция восстановления пароля будет доступна позже')">забыли пароль?</a>
  </div>

  <script>
    let userIdentifier = '';

    // Проверяем, не авторизован ли уже пользователь
    window.addEventListener('DOMContentLoaded', () => {
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      if (currentUser) {
        window.location.href = '/pages/index.html';
        return;
      }
      
      // Фокус на поле ввода
      document.getElementById('emailInput').focus();
    });

    function goToStep2() {
      const input = document.getElementById('emailInput');
      const errorEl = document.getElementById('step1Error');
      userIdentifier = input.value.trim();
      
      if (!userIdentifier) {
        errorEl.textContent = 'Введите email или имя пользователя';
        input.focus();
        return;
      }
      
      if (userIdentifier.length < 2) {
        errorEl.textContent = 'Слишком короткое значение';
        input.focus();
        return;
      }
      
      errorEl.textContent = '';
      
      // Показываем второй шаг
      document.getElementById('step1').classList.remove('active');
      document.getElementById('step2').classList.add('active');
      document.getElementById('backBtn').style.display = 'flex';
      document.getElementById('userDisplay').textContent = userIdentifier;
      document.getElementById('passInput').focus();
    }

    function goBack() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('step2Error').textContent = '';
      document.getElementById('passInput').value = '';
      document.getElementById('emailInput').focus();
    }

    async function doLogin() {
      const password = document.getElementById('passInput').value;
      const errorEl = document.getElementById('step2Error');
      const loginBtn = document.getElementById('step2Btn');
      
      if (!password) {
        errorEl.textContent = 'Введите пароль';
        document.getElementById('passInput').focus();
        return;
      }
      
      if (password.length < 3) {
        errorEl.textContent = 'Пароль слишком короткий';
        document.getElementById('passInput').focus();
        return;
      }
      
      errorEl.textContent = '';
      
      // Блокируем кнопку и показываем загрузку
      loginBtn.disabled = true;
      loginBtn.textContent = 'Вход...';
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            username: userIdentifier,
            password: password
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // Сохраняем данные пользователя
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          
          // Показываем успех
          errorEl.style.color = 'var(--accent)';
          errorEl.textContent = '✅ Вход выполнен!';
          
          // Редирект на главную
          setTimeout(() => {
            window.location.href = '/pages/index.html';
          }, 500);
        } else {
          // Показываем ошибку
          errorEl.style.color = 'var(--error)';
          errorEl.textContent = data.error || 'Неверный логин или пароль';
          
          // Разблокируем кнопку
          loginBtn.disabled = false;
          loginBtn.textContent = 'Войти';
          
          // Очищаем поле пароля
          document.getElementById('passInput').value = '';
          document.getElementById('passInput').focus();
        }
      } catch (error) {
        console.error('Ошибка входа:', error);
        errorEl.style.color = 'var(--error)';
        errorEl.textContent = 'Ошибка соединения с сервером';
        
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
      }
    }

    // Enter на шаге 1
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        goToStep2();
      }
    });

    // Enter на шаге 2
    document.getElementById('passInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        doLogin();
      }
    });

    // Escape для возврата на шаг 1
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('step2').classList.contains('active')) {
        goBack();
      }
    });
  </script>
</body>
</html>
