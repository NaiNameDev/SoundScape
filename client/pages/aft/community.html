<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сообщество — SoundCloud Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #2a2a2a;
      --bg-player: #111;
      --surface: #333;
      --surface-hover: #3d3d3d;
      --accent: #3dc8a0;
      --accent-btn: #2fb890;
      --text-primary: #fff;
      --text-secondary: #aaa;
      --text-muted: #666;
      --border: #3a3a3a;
      --radius-pill: 999px;
      --radius-card: 10px;
      --error: #ff6b6b;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; background: var(--bg);
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
    }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s; text-decoration: none;
    }
    .icon-btn:hover { opacity: 0.85; }
    .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .btn-home { background: var(--accent); color: #000; }
    .btn-back { background: #555; color: var(--text-secondary); }
    .btn-profile { background: var(--accent); color: #000; }

    .nav-title {
      flex: 1;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-join {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-pill);
      color: #000;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-join:hover { background: var(--accent-btn); }

    .btn-leave {
      background: transparent;
      border: 1px solid var(--error);
      border-radius: var(--radius-pill);
      color: var(--error);
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-leave:hover { background: var(--error); color: #fff; }

    main {
      flex: 1;
      display: flex;
      overflow-y: auto;
      padding: 0 0 120px 0;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .chat-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header .community-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.4;
    }

    .chat-header .community-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .chat-header .community-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chat-header .community-meta a {
      color: var(--accent);
      text-decoration: none;
    }
    .chat-header .community-meta a:hover { text-decoration: underline; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      display: flex;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-card);
      transition: background 0.15s;
    }
    .message:hover { background: var(--surface-hover); }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .message-content {
      flex: 1;
      min-width: 0;
    }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
    }

    .message-username {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }
    .message-username:hover { text-decoration: underline; color: var(--accent); }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .message-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .chat-input-area {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      background: #444;
      border: none;
      border-radius: var(--radius-pill);
      color: var(--text-primary);
      font-size: 14px;
      padding: 10px 16px;
      outline: none;
    }
    .chat-input-area input::placeholder { color: var(--text-secondary); }
    .chat-input-area input:focus { outline: 1px solid var(--accent); }

    .btn-send {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-send:hover { background: var(--accent-btn); }
    .btn-send svg { width: 18px; height: 18px; fill: #000; }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-prompt {
      padding: 12px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .login-prompt a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .login-prompt a:hover { text-decoration: underline; }

    /* MEMBERS SIDEBAR */
    .members-sidebar {
      width: 260px;
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
      background: var(--bg);
    }

    .members-sidebar h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .member-count {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-card);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .member-item:hover { background: var(--surface-hover); }

    .member-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      color: var(--text-secondary);
    }

    .member-info {
      flex: 1;
      min-width: 0;
    }

    .member-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .member-role {
      font-size: 11px;
      color: var(--text-muted);
    }

    .badge-creator {
      background: var(--accent);
      color: #000;
      padding: 1px 6px;
      border-radius: var(--radius-pill);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: 4px;
    }

    .empty-state {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 40px 20px;
      width: 100%;
    }

    .loading-state {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    .error-state {
      color: var(--error);
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    /* PLAYER */
    .player {
      position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
      background: var(--bg-player); border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; gap: 16px; z-index: 100;
    }
    .player-info {
      display: flex; align-items: center; gap: 12px;
      min-width: 200px; max-width: 300px;
    }
    .player-info .track-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-info .track-artist-small {
      font-size: 11px; color: var(--text-secondary);
    }
    .player-controls { display: flex; align-items: center; gap: 20px; }
    .player-controls button {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); display: flex; align-items: center; transition: color 0.15s;
    }
    .player-controls button:hover { color: var(--text-primary); }
    .player-controls .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .player-controls .play-btn:hover { background: var(--accent-btn); }
    .player-controls svg { width: 18px; height: 18px; fill: currentColor; }
    .player-controls .play-btn svg { width: 16px; height: 16px; }
    .player-progress { flex: 1; max-width: 480px; }
    .progress-bar {
      width: 100%; height: 3px; background: #333;
      border-radius: 3px; cursor: pointer; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 3px; transition: width 0.1s linear;
    }
    .player-volume { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
    .player-volume svg { width: 18px; height: 18px; fill: currentColor; }
    .volume-bar { width: 80px; height: 3px; background: #333; border-radius: 3px; cursor: pointer; }
    .volume-fill { height: 100%; width: 65%; background: var(--text-secondary); border-radius: 3px; }

    @media (max-width: 768px) {
      .members-sidebar { display: none; }
      main { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/pages/index.html" class="icon-btn btn-home" title="Главная">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="/pages/communities.html" class="icon-btn btn-back" title="Все сообщества">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <span class="nav-title" id="communityNavTitle">Загрузка...</span>
    <div id="membershipBtn"></div>
    <a href="/pages/profile.html" class="icon-btn btn-profile" title="Профиль">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </a>
  </nav>

  <main>
    <!-- CHAT AREA -->
    <div class="chat-area">
      <div class="chat-header" id="communityHeader">
        <div class="loading-state">Загрузка...</div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="loading-state">Загрузка сообщений...</div>
      </div>

      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Напишите сообщение..." maxlength="500" />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Отправить">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>

      <div class="login-prompt" id="loginPrompt" style="display: none;">
        <a href="/pages/login.html">Войдите</a>, чтобы отправлять сообщения
      </div>

      <div class="login-prompt" id="notMemberPrompt" style="display: none;">
        Вступите в сообщество, чтобы писать в чат
      </div>
    </div>

    <!-- MEMBERS SIDEBAR -->
    <div class="members-sidebar">
      <h3>👥 Участники</h3>
      <div class="member-count" id="memberCount"></div>
      <div id="membersList">
        <div class="loading-state">Загрузка...</div>
      </div>
    </div>
  </main>

  <!-- PLAYER BAR -->
  <div class="player">
    <div class="player-info">
      <div>
        <div class="track-name" id="playerTrackName">Нет трека</div>
        <div class="track-artist-small" id="playerArtistName">Выберите трек</div>
      </div>
    </div>
    <div class="player-controls">
      <button onclick="playerControls.previous()" title="Назад">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" onclick="playerControls.togglePlay()" title="Воспроизвести">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button onclick="playerControls.next()" title="Вперёд">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="player-progress">
      <div class="progress-bar" onclick="playerControls.seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="player-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <div class="volume-bar" onclick="playerControls.setVolume(event)">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" style="display: none;"></audio>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let communityId = null;
    let isMember = false;
    let creatorId = null;
    let playlist = [];
    let currentTrackIndex = -1;

    window.addEventListener('DOMContentLoaded', () => {
      setupPlayer();
      
      const urlParams = new URLSearchParams(window.location.search);
      communityId = urlParams.get('id');
      
      if (!communityId) {
        document.getElementById('communityHeader').innerHTML = '<div class="error-state">Сообщество не найдено</div>';
        return;
      }
      
      loadCommunityInfo();
      loadMembers();
      loadMessages();
      
      if (currentUser) {
        checkMembership();
      } else {
        document.getElementById('loginPrompt').style.display = 'block';
      }
      
      setInterval(loadMessagesSilently, 3000);
      setInterval(loadMembersSilently, 30000);
      
      // Enter для отправки
      document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });
    });

    function loadCommunityInfo() {
      fetch(`/api/community/info/${communityId}`)
        .then(response => response.json())
        .then(community => {
          creatorId = community.creator_id;
          document.getElementById('communityNavTitle').textContent = community.name;
          
          document.getElementById('communityHeader').innerHTML = `
            <h2>👥 ${escapeHtml(community.name)}</h2>
            ${community.description ? `<div class="community-desc">${escapeHtml(community.description)}</div>` : ''}
            <div class="community-meta">
              <span>👥 ${community.members_count} участников</span>
              <span>📅 ${formatDate(community.creation_date)}</span>
              <span>👑 Создатель: <a href="/pages/profile.html?user_id=${community.creator_id}">${escapeHtml(community.creator_name)}</a></span>
            </div>
          `;
        })
        .catch(() => {
          document.getElementById('communityHeader').innerHTML = '<div class="error-state">Ошибка загрузки</div>';
        });
    }

    function checkMembership() {
      fetch(`/api/community/check-membership/${communityId}/${currentUser.id}`)
        .then(response => response.json())
        .then(data => {
          isMember = data.is_member;
          
          const btnContainer = document.getElementById('membershipBtn');
          
          if (isMember) {
            btnContainer.innerHTML = '<button class="btn-leave" onclick="toggleMembership()">Выйти</button>';
            document.getElementById('chatInputArea').style.display = 'flex';
            document.getElementById('loginPrompt').style.display = 'none';
            document.getElementById('notMemberPrompt').style.display = 'none';
          } else {
            btnContainer.innerHTML = '<button class="btn-join" onclick="toggleMembership()">Вступить</button>';
            document.getElementById('chatInputArea').style.display = 'none';
            document.getElementById('loginPrompt').style.display = 'none';
            document.getElementById('notMemberPrompt').style.display = 'block';
          }
        });
    }

    function toggleMembership() {
      if (!currentUser) {
        window.location.href = '/pages/login.html';
        return;
      }
      
      const action = isMember ? 'leave' : 'join';
      
      fetch(`/api/community/${action}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          community_id: parseInt(communityId),
          user_id: currentUser.id
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          loadCommunityInfo();
          loadMembers();
          checkMembership();
        }
      });
    }

    function loadMembers() {
      fetch(`/api/community/members/${communityId}`)
        .then(response => response.json())
        .then(members => {
          document.getElementById('memberCount').textContent = `Всего: ${members.length}`;
          displayMembers(members);
        })
        .catch(() => {
          document.getElementById('membersList').innerHTML = '<div class="error-state">Ошибка</div>';
        });
    }

    function loadMembersSilently() {
      fetch(`/api/community/members/${communityId}`)
        .then(response => response.json())
        .then(members => displayMembers(members))
        .catch(() => {});
    }

    function displayMembers(members) {
      const container = document.getElementById('membersList');
      
      if (!members || members.length === 0) {
        container.innerHTML = '<div class="empty-state">Нет участников</div>';
        return;
      }
      
      container.innerHTML = members.map(m => `
        <a href="/pages/profile.html?user_id=${m.id}" class="member-item">
          <div class="member-avatar">${m.username.charAt(0).toUpperCase()}</div>
          <div class="member-info">
            <div class="member-name">
              ${escapeHtml(m.username)}
              ${m.id === creatorId ? '<span class="badge-creator">Создатель</span>' : ''}
            </div>
            <div class="member-role">${m.user_type === 'musician' ? '🎵 Музыкант' : '👤 Слушатель'}</div>
          </div>
        </a>
      `).join('');
    }

    function loadMessages() {
      fetch(`/api/community/messages/${communityId}?limit=50`)
        .then(response => response.json())
        .then(messages => displayMessages(messages))
        .catch(() => {
          document.getElementById('chatMessages').innerHTML = '<div class="error-state">Ошибка загрузки</div>';
        });
    }

    function loadMessagesSilently() {
      fetch(`/api/community/messages/${communityId}?limit=50`)
        .then(response => response.json())
        .then(messages => displayMessages(messages))
        .catch(() => {});
    }

    function displayMessages(messages) {
      const container = document.getElementById('chatMessages');
      
      if (!messages || messages.length === 0) {
        container.innerHTML = '<div class="empty-state">Нет сообщений. Начните общение!</div>';
        return;
      }
      
      container.innerHTML = messages.map(m => `
        <div class="message">
          <div class="message-avatar">${m.username.charAt(0).toUpperCase()}</div>
          <div class="message-content">
            <div class="message-header">
              <a href="/pages/profile.html?user_id=${m.user_id}" class="message-username">${escapeHtml(m.username)}</a>
              <span class="message-time">${timeAgo(m.date)}</span>
            </div>
            <div class="message-text">${escapeHtml(m.text)}</div>
          </div>
        </div>
      `).join('');
      
      // Прокрутка вниз
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      if (!currentUser || !isMember) return;
      
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      const btn = document.getElementById('sendBtn');
      
      if (!text) return;
      
      btn.disabled = true;
      
      fetch('/api/community/message', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          community_id: parseInt(communityId),
          user_id: currentUser.id,
          message_text: text
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          input.value = '';
          loadMessages();
        }
      })
      .catch(() => {})
      .finally(() => {
        btn.disabled = false;
        input.focus();
      });
    }

    function setupPlayer() {
      const audio = document.getElementById('audioPlayer');
      
      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          document.getElementById('progressFill').style.width = 
            (audio.currentTime / audio.duration) * 100 + '%';
        }
      });
      
      audio.addEventListener('ended', () => playerControls.next());
      
      audio.addEventListener('play', () => {
        document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      });
      
      audio.addEventListener('pause', () => {
        document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
      });
    }

    const playerControls = {
      playTrack(trackId, filePath, title, artist) {
        const audio = document.getElementById('audioPlayer');
        const exists = playlist.find(t => t.id === trackId);
        if (!exists) playlist.push({ id: trackId, filePath, title, artist });
        currentTrackIndex = playlist.findIndex(t => t.id === trackId);
        audio.src = filePath;
        audio.play();
        document.getElementById('playerTrackName').textContent = title || 'Трек';
        document.getElementById('playerArtistName').textContent = artist || 'Исполнитель';
        fetch('/api/track/play', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ track_id: trackId })
        });
      },
      togglePlay() {
        const audio = document.getElementById('audioPlayer');
        audio.paused ? audio.play() : audio.pause();
      },
      next() {
        if (!playlist.length) return;
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        const t = playlist[currentTrackIndex];
        this.playTrack(t.id, t.filePath, t.title, t.artist);
      },
      previous() {
        if (!playlist.length) return;
        currentTrackIndex = currentTrackIndex <= 0 ? playlist.length - 1 : currentTrackIndex - 1;
        const t = playlist[currentTrackIndex];
        this.playTrack(t.id, t.filePath, t.title, t.artist);
      },
      seek(event) {
        const audio = document.getElementById('audioPlayer');
        if (!audio.duration) return;
        const rect = event.currentTarget.getBoundingClientRect();
        audio.currentTime = ((event.clientX - rect.left) / rect.width) * audio.duration;
      },
      setVolume(event) {
        const audio = document.getElementById('audioPlayer');
        const rect = event.currentTarget.getBoundingClientRect();
        const vol = (event.clientX - rect.left) / rect.width;
        audio.volume = Math.max(0, Math.min(1, vol));
        document.getElementById('volumeFill').style.width = (vol * 100) + '%';
      }
    };

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      return new Date(dateString).toLocaleDateString('ru-RU', {
        year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function timeAgo(dateString) {
      const diff = Date.now() - new Date(dateString).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'только что';
      if (mins < 60) return `${mins} мин. назад`;
      const hours = Math.floor(diff / 3600000);
      if (hours < 24) return `${hours} ч. назад`;
      return formatDate(dateString);
    }
  </script>
</body>
