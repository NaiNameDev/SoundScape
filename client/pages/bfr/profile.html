<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - SoundCloud Clone</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/communities.html">Сообщества</a>
            <a href="/pages/profile.html">Профиль</a>
            <button onclick="logout()">Выйти</button>
        </nav>
    </header>

    <main>
        <div id="profileInfo">
            <h2>Загрузка профиля...</h2>
        </div>

        <section>
            <h2>Мои треки</h2>
            <div id="userTracks">
                <p>Загрузка треков...</p>
            </div>
        </section>

        <section>
            <h2>Мои сообщества</h2>
            <div id="userCommunities">
                <p>Загрузка сообществ...</p>
            </div>
        </section>
    </main>

    <script>
        let profileUserId = null;
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        
        window.addEventListener('DOMContentLoaded', () => {
            if (!currentUser) {
                window.location.href = '/pages/login.html';
                return;
            }
            
            // Проверяем, чей профиль смотрим
            const urlParams = new URLSearchParams(window.location.search);
            profileUserId = urlParams.get('user_id') || currentUser.id;
            
            loadUserProfile();
            loadUserTracks();
            loadUserCommunities();
        });

        function loadUserProfile() {
            fetch(`/api/user/info/${profileUserId}`)
                .then(response => response.json())
                .then(user => {
                    document.getElementById('profileInfo').innerHTML = `
                        <h2>Профиль пользователя</h2>
                        <p><strong>Имя пользователя:</strong> ${user.username}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Тип:</strong> ${user.user_type === 'musician' ? 'Музыкант' : 'Слушатель'}</p>
                        <p><strong>Иностранный агент:</strong> ${user.is_foreign_agent ? 'Да' : 'Нет'}</p>
                        <p><strong>Дата регистрации:</strong> ${user.registration_date}</p>
                    `;
                })
                .catch(error => {
                    console.error('Ошибка загрузки профиля:', error);
                });
        }

        function loadUserTracks() {
            fetch(`/api/user/tracks/${profileUserId}`)
                .then(response => response.json())
                .then(tracks => {
                    const container = document.getElementById('userTracks');
                    
                    if (!tracks || tracks.length === 0) {
                        container.innerHTML = '<p>Нет загруженных треков</p>';
                        return;
                    }
                    
                    container.innerHTML = tracks.map(track => `
                        <div class="track-item">
                            <h3>
                                <a href="/pages/track.html?id=${track.id}">${track.title}</a>
                            </h3>
                            <p>Жанр: ${track.genre || 'Не указан'}</p>
                            <p>Прослушиваний: ${track.plays_count}</p>
                            <p>Дата загрузки: ${track.upload_date}</p>
                        </div>
                        <hr>
                    `).join('');
                })
                .catch(error => {
                    console.error('Ошибка загрузки треков:', error);
                    document.getElementById('userTracks').innerHTML = '<p>Ошибка загрузки треков</p>';
                });
        }

        function loadUserCommunities() {
            fetch(`/api/user/communities/${profileUserId}`)
                .then(response => response.json())
                .then(communities => {
                    const container = document.getElementById('userCommunities');
                    
                    if (!communities || communities.length === 0) {
                        container.innerHTML = '<p>Не состоит в сообществах</p>';
                        return;
                    }
                    
                    container.innerHTML = communities.map(community => `
                        <div>
                            <h3>
                                <a href="/pages/community.html?id=${community.id}">
                                    ${community.name}
                                </a>
                            </h3>
                            <p>${community.description || 'Нет описания'}</p>
                            <p><small>Участников: ${community.members_count}</small></p>
                        </div>
                        <hr>
                    `).join('');
                })
                .catch(error => {
                    console.error('Ошибка загрузки сообществ:', error);
                    document.getElementById('userCommunities').innerHTML = '<p>Ошибка загрузки сообществ</p>';
                });
        }
    </script>
</body>
</html>
