<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщества - SoundCloud Clone</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/communities.html">Сообщества</a>
            <span id="authLinks">
                <a href="/pages/login.html">Войти</a>
                <a href="/pages/register.html">Регистрация</a>
            </span>
            <span id="userLinks" style="display: none;">
                <a href="/pages/profile.html">Профиль</a>
                <button onclick="logout()">Выйти</button>
            </span>
        </nav>
    </header>

    <main>
        <section>
            <h2>Все сообщества</h2>
            <div id="createCommunity" style="display: none;">
                <button onclick="showCreateForm()">Создать сообщество</button>
            </div>
            <div id="communitiesList">
                <p>Загрузка сообществ...</p>
            </div>
        </section>

        <div id="createForm" style="display: none;">
            <h3>Создание нового сообщества</h3>
            <form id="communityForm">
                <div>
                    <label for="communityName">Название:</label>
                    <input type="text" id="communityName" required>
                </div>
                <div>
                    <label for="communityDescription">Описание:</label>
                    <textarea id="communityDescription" rows="3"></textarea>
                </div>
                <button type="submit">Создать</button>
                <button type="button" onclick="hideCreateForm()">Отмена</button>
            </form>
        </div>
    </main>

    <script src="/src/chat.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            
            if (currentUser) {
                document.getElementById('createCommunity').style.display = 'block';
            }
            
            loadCommunities();
        });

        function loadCommunities() {
            fetch('/api/communities')
                .then(response => response.json())
                .then(communities => {
                    const container = document.getElementById('communitiesList');
                    
                    if (!communities || communities.length === 0) {
                        container.innerHTML = '<p>Нет созданных сообществ</p>';
                        return;
                    }
                    
                    container.innerHTML = communities.map(community => `
                        <div style="border: 1px solid #ccc; padding: 15px; margin: 10px 0;">
                            <h3>
                                <a href="/pages/community.html?id=${community.id}">
                                    ${community.name}
                                </a>
                            </h3>
                            <p>${community.description || 'Нет описания'}</p>
                            <p>
                                <small>
                                    Создатель: 
                                    <a href="/pages/profile.html?user_id=${community.creator_id}">
                                        ${community.creator_name}
                                    </a>
                                </small>
                            </p>
                            <p><small>Участников: ${community.members_count}</small></p>
                            <p><small>Создано: ${community.creation_date}</small></p>
                        </div>
                    `).join('');
                })
                .catch(error => {
                    console.error('Ошибка загрузки сообществ:', error);
                    document.getElementById('communitiesList').innerHTML = 
                        '<p>Ошибка загрузки сообществ</p>';
                });
        }

        function showCreateForm() {
            document.getElementById('createForm').style.display = 'block';
        }

        function hideCreateForm() {
            document.getElementById('createForm').style.display = 'none';
        }

        document.getElementById('communityForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert('Необходимо войти в систему');
                return;
            }
            
            const formData = {
                name: document.getElementById('communityName').value,
                description: document.getElementById('communityDescription').value,
                creator_id: currentUser.id
            };
            
            try {
                const response = await fetch('/api/community/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('Сообщество создано!');
                    hideCreateForm();
                    loadCommunities();
                } else {
                    alert('Ошибка создания сообщества');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка соединения с сервером');
            }
        });
    </script>
</body>
</html>
