<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер - SoundCloud Clone</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/player.html">Плеер</a>
            <span id="userLinks">
                <a href="/pages/profile.html">Профиль</a>
            </span>
        </nav>
    </header>

    <main>
        <div id="playerContainer">
            <h2>Музыкальный плеер</h2>
            
            <div id="nowPlaying">
                <p>Выберите трек для воспроизведения</p>
            </div>
            
            <audio id="audioPlayer" controls style="width: 100%;">
                Ваш браузер не поддерживает аудиоэлемент.
            </audio>
            
            <div id="playerControls">
                <button onclick="previousTrack()">⏮ Предыдущий</button>
                <button id="playPauseBtn" onclick="togglePlayPause()">▶ Воспроизвести</button>
                <button onclick="nextTrack()">Следующий ⏭</button>
            </div>
        </div>

        <section>
            <h2>Очередь воспроизведения</h2>
            <div id="playlist">
                <p>Плейлист пуст</p>
            </div>
        </section>
    </main>

    <script src="/src/player.js"></script>
</body>
</html>
