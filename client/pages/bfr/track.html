<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трек - SoundCloud Clone</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/communities.html">Сообщества</a>
            <span id="authLinks">
                <a href="/pages/login.html">Войти</a>
                <a href="/pages/register.html">Регистрация</a>
            </span>
            <span id="userLinks" style="display: none;">
                <a href="/pages/profile.html">Профиль</a>
                <a href="/pages/upload.html">Загрузить</a>
                <button onclick="logout()">Выйти</button>
            </span>
        </nav>
    </header>

    <main>
        <div id="trackInfo">
            <h2>Загрузка информации о треке...</h2>
        </div>

        <section id="playerSection" style="display: none;">
            <h3>Плеер</h3>
            <audio id="audioPlayer" controls style="width: 100%;">
                Ваш браузер не поддерживает аудиоэлемент.
            </audio>
        </section>

        <section id="likeSection" style="display: none;">
            <h3>Оценка трека</h3>
            <div id="likeInfo"></div>
            <button id="likeBtn" onclick="toggleLike()">❤️ Лайк</button>
        </section>

        <section id="commentsSection" style="display: none;">
            <h3>Комментарии (<span id="commentsCount">0</span>)</h3>
            
            <!-- Форма добавления комментария -->
            <div id="commentFormWrapper" style="display: none;">
                <div style="border: 1px solid #ccc; padding: 15px; margin: 10px 0;">
                    <h4>Оставить комментарий</h4>
                    <textarea id="commentText" placeholder="Напишите ваш комментарий..." rows="4" style="width: 100%;"></textarea>
                    <br>
                    <button onclick="addComment()">Отправить комментарий</button>
                    <span id="commentStatus"></span>
                </div>
            </div>
            
            <!-- Список комментариев -->
            <div id="commentsList">
                <p>Загрузка комментариев...</p>
            </div>
        </section>
    </main>

    <script src="/src/chat.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let trackId = null;
        let trackData = null;

        window.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            
            // Получаем ID трека из URL
            const urlParams = new URLSearchParams(window.location.search);
            trackId = urlParams.get('id');
            
            if (!trackId) {
                document.getElementById('trackInfo').innerHTML = '<h2>Трек не найден</h2>';
                return;
            }
            
            loadTrackInfo();
            loadComments();
            
            if (currentUser) {
                document.getElementById('commentFormWrapper').style.display = 'block';
                checkUserLike();
            } else {
                document.getElementById('commentFormWrapper').innerHTML = 
                    '<p><a href="/pages/login.html">Войдите</a>, чтобы оставить комментарий</p>';
                document.getElementById('commentFormWrapper').style.display = 'block';
            }
            
            document.getElementById('commentsSection').style.display = 'block';
            
            // Автообновление комментариев каждые 5 секунд
            setInterval(loadCommentsSilently, 5000);
        });

        function loadTrackInfo() {
            fetch(`/api/track/info/${trackId}`)
                .then(response => response.json())
                .then(track => {
                    trackData = track;
                    
                    document.getElementById('trackInfo').innerHTML = `
                        <h2>${track.title}</h2>
                        <p><strong>Исполнитель:</strong> 
                            <a href="/pages/profile.html?user_id=${track.artist_id}">${track.artist}</a>
                        </p>
                        <p><strong>Жанр:</strong> ${track.genre || 'Не указан'}</p>
                        <p><strong>Описание:</strong> ${track.description || 'Нет описания'}</p>
                        <p><strong>Прослушиваний:</strong> ${track.plays_count}</p>
                        <p><strong>Дата загрузки:</strong> ${track.upload_date}</p>
                    `;
                    
                    // Настраиваем плеер
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = track.file_path;
                    document.getElementById('playerSection').style.display = 'block';
                    
                    // Увеличиваем счетчик прослушиваний
                    fetch('/api/track/play', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ track_id: parseInt(trackId) })
                    });
                    
                    document.getElementById('likeSection').style.display = 'block';
                })
                .catch(error => {
                    console.error('Ошибка загрузки трека:', error);
                    document.getElementById('trackInfo').innerHTML = '<h2>Ошибка загрузки трека</h2>';
                });
        }

        function checkUserLike() {
            if (!currentUser) return;
            
            fetch(`/api/track/${trackId}/likes?user_id=${currentUser.id}`)
                .then(response => response.json())
                .then(data => {
                    const likeBtn = document.getElementById('likeBtn');
                    const likeInfo = document.getElementById('likeInfo');
                    
                    likeInfo.innerHTML = `<p>Всего лайков: <strong>${data.likes}</strong></p>`;
                    
                    if (data.is_liked) {
                        likeBtn.textContent = '💔 Убрать лайк';
                        likeBtn.style.backgroundColor = '#ffcccc';
                    } else {
                        likeBtn.textContent = '❤️ Лайк';
                        likeBtn.style.backgroundColor = '';
                    }
                });
        }

        function toggleLike() {
            if (!currentUser) {
                alert('Необходимо войти в систему');
                return;
            }
            
            const isLiked = document.getElementById('likeBtn').textContent.includes('Убрать');
            const action = isLiked ? 'unlike' : 'like';
            
            fetch('/api/track/like', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser.id,
                    track_id: parseInt(trackId),
                    action: action
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    checkUserLike();
                }
            })
            .catch(error => console.error('Ошибка лайка:', error));
        }

        function loadComments() {
            fetch(`/api/track/${trackId}/comments`)
                .then(response => response.json())
                .then(comments => {
                    displayComments(comments);
                })
                .catch(error => {
                    console.error('Ошибка загрузки комментариев:', error);
                    document.getElementById('commentsList').innerHTML = 
                        '<p style="color: red;">Ошибка загрузки комментариев</p>';
                });
        }

        function loadCommentsSilently() {
            // Загружаем комментарии без показа ошибок
            fetch(`/api/track/${trackId}/comments`)
                .then(response => response.json())
                .then(comments => {
                    displayComments(comments);
                })
                .catch(error => {
                    console.error('Ошибка автообновления комментариев:', error);
                });
        }

        function displayComments(comments) {
            const commentsList = document.getElementById('commentsList');
            const commentsCount = document.getElementById('commentsCount');
            
            // Обновляем счетчик
            if (commentsCount) {
                commentsCount.textContent = comments.length;
            }
            
            if (!comments || comments.length === 0) {
                commentsList.innerHTML = '<p style="color: #666;">Нет комментариев. Будьте первым, кто оставит комментарий!</p>';
                return;
            }
            
            // Сортируем комментарии: новые снизу
            const sortedComments = [...comments].reverse();
            
            commentsList.innerHTML = sortedComments.map(comment => `
                <div style="border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <strong>
                            <a href="/pages/profile.html?user_id=${comment.user_id}" 
                               style="color: #0066cc; text-decoration: none;">
                                👤 ${comment.username}
                            </a>
                        </strong>
                        <small style="color: #888;">${formatDate(comment.date)}</small>
                    </div>
                    <div style="padding: 10px; background-color: #f9f9f9; border-radius: 3px;">
                        <p style="margin: 0; white-space: pre-wrap;">${escapeHtml(comment.text)}</p>
                    </div>
                    <div style="margin-top: 10px;">
                        <small>#${comment.id}</small>
                    </div>
                </div>
            `).join('');
        }

        function addComment() {
            if (!currentUser) {
                alert('Необходимо войти в систему');
                window.location.href = '/pages/login.html';
                return;
            }
            
            const commentText = document.getElementById('commentText').value.trim();
            const commentStatus = document.getElementById('commentStatus');
            
            if (!commentText) {
                commentStatus.innerHTML = '<span style="color: red;">Введите текст комментария</span>';
                return;
            }
            
            if (commentText.length < 2) {
                commentStatus.innerHTML = '<span style="color: red;">Комментарий слишком короткий (минимум 2 символа)</span>';
                return;
            }
            
            if (commentText.length > 1000) {
                commentStatus.innerHTML = '<span style="color: red;">Комментарий слишком длинный (максимум 1000 символов)</span>';
                return;
            }
            
            commentStatus.innerHTML = '<span style="color: blue;">Отправка...</span>';
            
            fetch('/api/track/comment', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser.id,
                    track_id: parseInt(trackId),
                    comment_text: commentText
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('commentText').value = '';
                    commentStatus.innerHTML = '<span style="color: green;">✅ Комментарий добавлен!</span>';
                    
                    // Обновляем список комментариев
                    loadComments();
                    
                    // Очищаем статус через 3 секунды
                    setTimeout(() => {
                        commentStatus.innerHTML = '';
                    }, 3000);
                } else {
                    commentStatus.innerHTML = '<span style="color: red;">❌ Ошибка: ' + 
                        (data.error || 'Не удалось добавить комментарий') + '</span>';
                }
            })
            .catch(error => {
                console.error('Ошибка:', error);
                commentStatus.innerHTML = '<span style="color: red;">❌ Ошибка соединения с сервером</span>';
            });
        }

        // Вспомогательные функции
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'Только что';
            if (minutes < 60) return `${minutes} мин. назад`;
            if (hours < 24) return `${hours} ч. назад`;
            if (days < 7) return `${days} дн. назад`;
            
            return date.toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Отправка комментария по Ctrl+Enter
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                addComment();
            }
        });
    </script>
</body>
</html>
