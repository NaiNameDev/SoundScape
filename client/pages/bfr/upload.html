<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка трека - SoundCloud Clone</title>
</head>
<body>
    <header>
        <h1>🎵 SoundCloud Clone</h1>
        <nav>
            <a href="/pages/index.html">Главная</a>
            <a href="/pages/profile.html">Профиль</a>
            <a href="/pages/upload.html">Загрузить</a>
            <button onclick="logout()">Выйти</button>
        </nav>
    </header>

    <main>
        <h2>Загрузка нового трека</h2>
        
        <form id="uploadForm" enctype="multipart/form-data">
            <div>
                <label for="title">Название трека:</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div>
                <label for="audioFile">Аудиофайл (MP3, WAV, OGG):</label>
                <input type="file" id="audioFile" name="audio" accept=".mp3,.wav,.ogg" required>
            </div>
            
            <div>
                <label for="genre">Жанр:</label>
                <select id="genre" name="genre">
                    <option value="Rock">Рок</option>
                    <option value="Pop">Поп</option>
                    <option value="Electronic">Электронная</option>
                    <option value="Hip-Hop">Хип-хоп</option>
                    <option value="Jazz">Джаз</option>
                    <option value="Classical">Классическая</option>
                    <option value="Other">Другое</option>
                </select>
            </div>
            
            <div>
                <label for="description">Описание:</label>
                <textarea id="description" name="description" rows="4"></textarea>
            </div>
            
            <div id="uploadStatus"></div>
            
            <button type="submit">Загрузить трек</button>
        </form>
    </main>

    <script src="/src/upload.js"></script>
</body>
</html>
